<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDB Style Reveal Game</title>

<style>
body { background:#0b0f14; color:white; font-family:sans-serif; margin:0; padding:20px; }
.container { max-width:1100px; margin:auto; }
.card { background:#111; padding:20px; border-radius:12px; margin-bottom:20px; }
button { padding:10px 14px; margin:5px; border:none; border-radius:8px; background:#333; color:white; cursor:pointer; }
.primary { background:#4f46e5; }
.hidden { display:none; }
img { max-width:100%; border-radius:10px; }
</style>
</head>

<body>
<div class="container">

<!-- INTRO -->
<div id="intro" class="card">
  <h2>Before the Game Begins</h2>

  <div style="display:flex; gap:20px; flex-wrap:wrap;">
    <div style="flex:1; min-width:250px;">
      <img id="introArt" src="" />
    </div>

    <div style="flex:2;">
      <div id="story"></div>

      <div style="margin-top:20px;">
        <button class="primary" onclick="startIntro()">Play Intro</button>
        <button onclick="bypass()">Bypass Original and Start Game</button>
      </div>

      <div id="startGameWrap" class="hidden">
        <button class="primary" onclick="startRound()">Start Round</button>
      </div>
    </div>
  </div>

  <audio id="introAudio"></audio>
</div>

<!-- GAME -->
<div id="game" class="card hidden">
  <h2 id="title">Mystery track loaded</h2>

  <audio id="player" controls></audio>

  <div id="hints"></div>

  <button id="revealBtn" onclick="reveal()" disabled>Reveal</button>
  <button onclick="nextTrack()">Next</button>

  <div id="answer"></div>
</div>

</div>

<script>

const INTRO_AUDIO = "https://www.dropbox.com/scl/fi/emu7122b7nqxd9hz9v5c6/Same-Damn-Band-1.mp3?rlkey=7c9by9hu7rzss5b542nfq2dc9&raw=1";

const STORY = [
"Hello Texas started writing music in January 2026 after a phone conversation with Steve Peters and Stephen Bender.",
"This was the first song they wrote together.",
"But they found Artificial Intelligence.",
"A good song is a good song when it's written well.",
"Same lyrics. Different prompts.",
"This is the result:"
];

let tracks = [];
let index = 0;
let timer;
let elapsed = 0;

fetch("tracks_updated.json")
  .then(r=>r.json())
  .then(data=>{
    tracks = data;
  });

function current(){ return tracks[index]; }

function startIntro(){
  document.getElementById("introAudio").src = INTRO_AUDIO;
  document.getElementById("introAudio").play();

  const storyDiv = document.getElementById("story");
  storyDiv.innerHTML = "";

  STORY.forEach((line,i)=>{
    setTimeout(()=>{
      const p = document.createElement("p");
      p.innerText = line;
      storyDiv.appendChild(p);
    }, 5000 + (i*8000));
  });

  setTimeout(()=>{
    document.getElementById("startGameWrap").classList.remove("hidden");
  },90000);
}

function bypass(){
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
}

function startRound(){
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  const t = current();

  document.getElementById("title").innerText = "Mystery track loaded";
  document.getElementById("answer").innerText = "";
  document.getElementById("hints").innerHTML = "";

  const player = document.getElementById("player");
  player.src = t.remixUrl;
  player.play();

  elapsed = 0;

  clearInterval(timer);
  timer = setInterval(()=>{
    elapsed++;

    if(elapsed === 20) addHint(t.hintList[0]);
    if(elapsed === 40) addHint(t.hintList[1]);
    if(elapsed === 50) addHint(t.hintList[2]);

    if(elapsed === 60){
      document.getElementById("revealBtn").disabled = false;
    }

    if(elapsed === 90){
      reveal();
      clearInterval(timer);
    }

  },1000);
}

function addHint(text){
  if(!text) return;
  const div = document.createElement("div");
  div.style.marginTop = "10px";
  div.style.background = "#222";
  div.style.padding = "10px";
  div.style.borderRadius = "8px";
  div.innerText = text;
  document.getElementById("hints").appendChild(div);
}

function reveal(){
  const t = current();
  document.getElementById("title").innerText = t.title;
  document.getElementById("answer").innerText = t.answer;
}

function nextTrack(){
  index++;
  if(index >= tracks.length) index = 0;
  startRound();
}

</script>

</body>
</html>
